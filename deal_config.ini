# 八红桃发牌配置 (BaHongTao Deal Card Config)
#
# 将此文件放在与 web_server.py 同目录，或通过 API config_file 参数指定路径。
# 缺省时使用代码中的默认值（与本文件一致）。

[BaHongTaoDealCard]
# 癞子概率档位: min-max:weight（权重为百分数，四档总和应为 100）
#   0-2 张:  69%
#   3-4 张:  20%
#   5-7 张:  10%
#   8 张:    1%
WildTiers=0-2:69|3-4:20|5-7:10|8:1

# 机器人最多癞子数（机器人座位 = P2/P3/P4，P1 为人类）
# 注意：四人癞子总数必须 = 8，当人类拿较少时，underflow 补偿可能给机器人追加癞子。
RobotMaxWilds=1

# 自然牌发放策略: 0=none(纯随机) 1=compensate(牌力补偿)
ControlMode=1

# 补偿触发阈值（百分比）：最强与最弱牌力差距超过此值时触发补偿调换
CompensateThreshold=30

# ── 牌力评分权重 ──
ScoreBomb=30           # 炸弹（4+张同点）
ScoreSameColorLink=25  # 同花顺（5张同花色连续）
ScoreSteelPlate=15     # 钢板（2个连续点数各3张）
ScoreLinkPair=10       # 连对（3个连续点数各2张）
ScoreBigJoker=10       # 大王
ScoreThree=6           # 三张（3张同点）
ScoreSmallJoker=6      # 小王
ScoreWild=5            # 癞子（万能牌，每张计分）
