<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八癞子掼蛋 — 一键理牌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --felt: #1a5c2a;
  --felt-dark: #0f3d1a;
  --gold: #d4a843;
  --gold-light: #f0d68a;
  --cream: #f5f0e8;
  --card-bg: #fffff5;
  --card-red: #c0392b;
  --card-black: #1a1a2e;
  --wild-glow: #ff6b9d;
  --joker-gold: #e8a317;
  --text: #e8e0d0;
  --text-dim: #a09888;
  --panel: rgba(0,0,0,0.45);
  --panel-border: rgba(212,168,67,0.3);
  --highlight: #4caf50;
  --radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background:
    radial-gradient(ellipse at center, #1a6b30 0%, #0f3d1a 40%, #0a2812 100%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

/* ── Noise overlay ── */
body::before {
  content: '';
  position: fixed; inset:0; z-index:0; pointer-events:none;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
}

.container { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:20px 24px; }

/* ── Header ── */
.header {
  text-align:center; padding:28px 0 18px;
  border-bottom: 1px solid var(--panel-border);
  margin-bottom: 24px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.6rem; font-weight:800; letter-spacing:0.04em;
  background: linear-gradient(180deg, #f0d68a 20%, #b8860b 80%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow: none;
  margin-bottom:4px;
}
.header .sub {
  font-size:0.9rem; color:var(--text-dim); letter-spacing:0.15em; font-weight:300;
}

/* ── Buttons ── */
.controls {
  display:flex; justify-content:center; gap:16px; margin-bottom:28px; flex-wrap:wrap;
}
.btn {
  font-family: 'Noto Sans SC', sans-serif;
  padding:12px 36px; border-radius:6px; font-size:1rem; font-weight:500;
  cursor:pointer; transition:all 0.25s ease;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold);
  letter-spacing:0.06em;
  position:relative; overflow:hidden;
}
.btn::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(212,168,67,0.15), transparent 60%);
  opacity:0; transition:opacity 0.3s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,168,67,0.25); }
.btn:hover::after { opacity:1; }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(135deg, #c8942d, #a07618);
  color: #1a1a0a; border-color: transparent; font-weight:700;
}
.btn.primary:hover { box-shadow: 0 4px 24px rgba(212,168,67,0.4); }
.btn.danger { border-color: #c0392b; color: #e74c3c; }
.btn.danger:hover { box-shadow: 0 4px 20px rgba(231,76,60,0.25); }
.btn.danger::after { background: linear-gradient(135deg, rgba(231,76,60,0.15), transparent 60%); }
.btn:disabled {
  opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none;
}

/* ── Info bar ── */
.info-bar {
  display:flex; justify-content:center; gap:32px; margin-bottom:20px;
  flex-wrap:wrap; font-size:0.9rem; color:var(--text-dim);
}
.info-bar span { display:flex; align-items:center; gap:8px; }
.info-bar .val { color:var(--gold-light); font-weight:600; }

/* ── Cards display ── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size:1.2rem; color:var(--gold-light); margin-bottom:12px;
  letter-spacing:0.05em; display:flex; align-items:center; gap:10px;
}
.section-title::before {
  content:''; width:4px; height:18px; background:var(--gold);
  border-radius:2px; display:inline-block;
}
.card-row {
  display:flex; flex-wrap:wrap; gap:8px; padding:16px 20px;
  background: var(--panel); border-radius:var(--radius);
  border: 1px solid var(--panel-border);
  min-height:70px; align-items:center; margin-bottom:16px;
}

/* ── Individual card ── */
.card {
  width:60px; height:86px; border-radius:5px;
  background: var(--card-bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.4);
  position:relative; transition: transform 0.2s, box-shadow 0.2s;
  font-family: 'Playfair Display', serif;
  user-select:none; cursor:default;
}
.card:hover { transform: translateY(-4px); box-shadow: 2px 7px 16px rgba(0,0,0,0.5); }
.card .suit { font-size:1rem; line-height:1; margin-bottom:2px; }
.card .rank { font-size:1.15rem; font-weight:700; line-height:1; }
.card.red .suit, .card.red .rank { color: var(--card-red); }
.card.black .suit, .card.black .rank { color: var(--card-black); }

/* Wild card special */
.card.wild {
  background: linear-gradient(135deg, #2d0036, #6b1d7b);
  border: 2px solid #ff6b9d;
}
.card.wild .rank { color: #ff6b9d; font-size:1.3rem; font-weight:800; }
.card.wild::after {
  content:'癞'; position:absolute; bottom:3px; right:6px;
  font-size:0.6rem; color:rgba(255,107,157,0.6); font-family:'Noto Sans SC',sans-serif;
}

/* Joker card */
.card.joker {
  background: linear-gradient(135deg, #3d2b00, #8b6914);
  border: 2px solid #e8a317;
}
.card.joker .rank { color: #e8a317; font-size:0.85rem; }

/* ── Zones ── */
.zones { display:flex; flex-direction:column; gap:20px; margin-top:24px; }
.zone { margin-bottom:4px; }
.zone-label {
  font-family: 'Playfair Display', serif;
  font-size:0.9rem; color:var(--gold); margin-bottom:8px;
  display:flex; align-items:center; gap:8px; font-weight:600;
}
.zone-label .count {
  background:rgba(212,168,67,0.2); padding:2px 10px; border-radius:10px;
  font-size:0.8rem; font-weight:400;
}

/* ── Card group ── */
.card-group {
  display:inline-flex; align-items:center; gap:3px;
  padding:6px 12px; margin:4px 6px;
  border-radius:6px; background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  position:relative;
}
.card-group .group-tag {
  font-size:0.65rem; color:var(--text-dim); letter-spacing:0.04em;
  margin-right:8px; white-space:nowrap; font-family:'Noto Sans SC',sans-serif;
  background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:3px;
  min-width:44px; text-align:center;
}
.card-group .group-tag.type-bomb   { color:#ff9800; background:rgba(255,152,0,0.2); }
.card-group .group-tag.type-flush  { color:#e91e63; background:rgba(233,30,99,0.2); }
.card-group .group-tag.type-king   { color:#ffd700; background:rgba(255,215,0,0.25); }
.card-group .group-tag.type-straight { color:#4caf50; background:rgba(76,175,80,0.2); }
.card-group .group-tag.type-board  { color:#00bcd4; background:rgba(0,188,212,0.2); }
.card-group .group-tag.type-steel  { color:#9c27b0; background:rgba(156,39,176,0.25); }
.card-group .group-tag.type-three_two { color:#ff5722; background:rgba(255,87,34,0.2); }
.card-group .group-tag.type-triple { color:#8bc34a; background:rgba(139,195,74,0.2); }
.card-group .group-tag.type-pair   { color:#2196f3; background:rgba(33,150,243,0.2); }
.card-group .group-tag.type-single { color:#9e9e9e; background:rgba(158,158,158,0.2); }
.card-group .mini-card {
  width:32px; height:46px; border-radius:3px; background:var(--card-bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:0.65rem; box-shadow: 1px 2px 4px rgba(0,0,0,0.3);
  font-family:'Playfair Display',serif;
}
.card-group .mini-card.red { color:var(--card-red); }
.card-group .mini-card.black { color:var(--card-black); }
.card-group .mini-card.wild {
  background:linear-gradient(135deg,#2d0036,#6b1d7b); color:#ff6b9d; font-weight:700;
}
.card-group .mini-card.joker {
  background:linear-gradient(135deg,#3d2b00,#8b6914); color:#e8a317;
}

/* ── Strategy Table ── */
.strats-panel {
  margin-top:32px;
  background: var(--panel); border-radius:var(--radius);
  border: 1px solid var(--panel-border);
  overflow:hidden;
}
.strats-header {
  padding:14px 20px; border-bottom:1px solid var(--panel-border);
  font-family:'Playfair Display',serif; font-size:1.1rem;
  color:var(--gold-light); letter-spacing:0.04em;
  display:flex; justify-content:space-between; align-items:center;
}
.strats-header .desc { font-size:0.75rem; color:var(--text-dim); font-weight:300; }
.strat-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.strat-table th {
  padding:10px 12px; text-align:center; font-weight:500;
  color:var(--gold); font-size:0.75rem; letter-spacing:0.05em;
  background:rgba(0,0,0,0.25); border-bottom:1px solid var(--panel-border);
}
.strat-table td {
  padding:8px 12px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.04);
}
.strat-table tr.best-row {
  background:rgba(76,175,80,0.18); outline:1px solid var(--highlight);
}
.strat-table tr.best-row td { color:var(--gold-light); font-weight:500; }
.strat-table tr.best-row td:first-child::before {
  content:'★ '; color:#ffd700;
}
.strat-table tbody tr { transition:background 0.2s; cursor:pointer; }
.strat-table tbody tr:hover { background:rgba(255,255,255,0.06); }
.strat-table .stat-badge {
  display:inline-block; min-width:24px; padding:2px 6px; border-radius:3px;
  font-weight:600; font-size:0.78rem;
}
.stat-high { background:rgba(76,175,80,0.25); color:#81c784; }
.stat-mid { background:rgba(255,193,7,0.2); color:#ffd54f; }
.stat-low { background:rgba(244,67,54,0.2); color:#ef9a9a; }

/* ── Loading ── */
.loading { display:none; text-align:center; padding:40px; }
.loading.active { display:block; }
.spinner {
  width:36px; height:36px; border:3px solid var(--panel-border);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin 0.8s linear infinite; margin:0 auto 12px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Toast ── */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:999;
  background:rgba(0,0,0,0.85); color:var(--gold-light); padding:12px 28px;
  border-radius:8px; border:1px solid var(--gold); font-size:0.9rem;
  opacity:0; transition:opacity 0.3s; pointer-events:none;
}
.toast.show { opacity:1; }

/* ── Responsive ── */
@media (max-width:768px) {
  .container { padding:12px; }
  .header h1 { font-size:1.8rem; }
  .card { width:44px; height:64px; }
  .card .rank { font-size:0.9rem; }
  .card-row { gap:4px; padding:10px; }
  .strat-table { font-size:0.7rem; }
  .strat-table th, .strat-table td { padding:6px 4px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>八癞子掼蛋</h1>
    <div class="sub">一键智能理牌 · 策略对比可视化</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn primary" id="btnDeal" onclick="doDeal()">🂠 发牌</button>
    <button class="btn" id="btnSort" onclick="doSort()" disabled>✦ 一键理牌</button>
    <button class="btn danger" id="btnClear" onclick="doClear()">✕ 清空</button>
  </div>

  <!-- Info bar -->
  <div class="info-bar" id="infoBar" style="display:none">
    <span>癞子: <span class="val" id="infoWild">0</span>/8</span>
    <span>自然牌: <span class="val" id="infoNat">0</span></span>
    <span>策略总数: <span class="val" id="infoStrats">0</span></span>
    <span>单张最优: <span class="val" id="infoBestSingles">-</span></span>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--text-dim)">计算最优理牌方案...</div>
  </div>

  <!-- Hand display -->
  <div class="section-title">📋 当前手牌</div>
  <div class="card-row" id="handDisplay">
    <span style="color:var(--text-dim);font-size:0.9rem">点击「发牌」开始</span>
  </div>

  <!-- Sorted zones -->
  <div id="zonesContainer" style="display:none">
    <div class="section-title">📐 最优理牌结果</div>
    <div class="zones" id="zones"></div>
  </div>

  <!-- Strategy comparison table -->
  <div id="stratsContainer" style="display:none">
    <div class="strats-panel">
      <div class="strats-header">
        策略方案对比
        <span class="desc">⭐ 标记为最优方案</span>
      </div>
      <div style="overflow-x:auto;max-height:500px;overflow-y:auto">
        <table class="strat-table">
          <thead>
            <tr>
              <th>排名</th><th>策略</th><th>癞子炸弹</th><th>提取顺序</th>
              <th>单张</th><th>炸弹</th><th>同花</th><th>5+炸</th>
              <th>顺子</th><th>木板</th><th>钢板</th><th>3+2</th>
              <th>三张</th><th>对子</th>
            </tr>
          </thead>
          <tbody id="stratBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let currentHand = null;
let sortResult = null;

// ── Helpers ──
const SUIT_SYMBOL = { S:'♠', H:'♥', C:'♣', D:'♦', X:'🃏' };
const SUIT_COLOR = { S:'black', H:'red', C:'black', D:'red', X:'black' };
const RANK_SHORT = { SJ:'小', BJ:'大' };

function cardClass(c) {
  if (c.is_wild) return 'wild';
  if (c.rank === 'SJ' || c.rank === 'BJ') return 'joker';
  return SUIT_COLOR[c.suit] || 'black';
}

function cardLabel(c) {
  if (c.is_wild) return '癞';
  if (c.rank === 'SJ') return '小';
  if (c.rank === 'BJ') return '大';
  return c.rank;
}

function cardSuit(c) {
  if (c.is_wild) return '';
  if (c.rank === 'SJ' || c.rank === 'BJ') return '';
  return SUIT_SYMBOL[c.suit] || '';
}

function groupTypeName(t) {
  const map = { king:'王炸', flush:'同花顺', bomb:'炸弹', straight:'顺子',
    board:'木板', steel:'钢板', three_two:'三带二', triple:'三张', pair:'对子', single:'单张' };
  return map[t] || t;
}

function groupTypeBadge(g) {
  if (g.group_type === 'bomb') return `${g.size}线炸`;
  return groupTypeName(g.group_type);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Deal ──
async function doDeal() {
  document.getElementById('btnDeal').disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('zonesContainer').style.display = 'none';
  document.getElementById('stratsContainer').style.display = 'none';
  sortResult = null;
  document.getElementById('btnSort').disabled = true;

  try {
    const resp = await fetch('/api/deal', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ level: '2' })
    });
    const data = await resp.json();
    currentHand = data.hand;

    document.getElementById('infoBar').style.display = 'flex';
    document.getElementById('infoWild').textContent = data.wild_count;
    document.getElementById('infoNat').textContent = data.total - data.wild_count;
    document.getElementById('infoStrats').textContent = '-';
    document.getElementById('infoBestSingles').textContent = '-';

    renderHand(data.hand);
    document.getElementById('btnSort').disabled = false;
    showToast(`发牌完成！${data.wild_count}张癞子 / 27张手牌`);
  } catch(e) {
    showToast('发牌失败: ' + e.message);
  } finally {
    document.getElementById('btnDeal').disabled = false;
    document.getElementById('loading').classList.remove('active');
  }
}

// ── Render hand ──
function renderHand(hand) {
  const container = document.getElementById('handDisplay');
  container.innerHTML = '';

  // Sort: wilds first, then by suit black/red, then rank
  const order = {A:14, K:13, Q:12, J:11};
  const rankVal = r => order[r] || parseInt(r) || 0;

  const sorted = [...hand].sort((a,b) => {
    if (a.is_wild !== b.is_wild) return a.is_wild ? -1 : 1;
    if (a.rank === 'BJ') return -1; if (b.rank === 'BJ') return 1;
    if (a.rank === 'SJ') return -1; if (b.rank === 'SJ') return 1;
    const v = rankVal(b.rank) - rankVal(a.rank);
    if (v !== 0) return v;
    return (a.suit||'').localeCompare(b.suit||'');
  });

  sorted.forEach(c => {
    const el = document.createElement('div');
    el.className = `card ${cardClass(c)}`;
    el.innerHTML = `<span class="suit">${cardSuit(c)}</span><span class="rank">${cardLabel(c)}</span>`;
    container.appendChild(el);
  });
}

// ── Sort ──
async function doSort() {
  if (!currentHand) return;
  document.getElementById('btnSort').disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('zonesContainer').style.display = 'none';
  document.getElementById('stratsContainer').style.display = 'none';

  try {
    const resp = await fetch('/api/sort', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cards: currentHand })
    });
    sortResult = await resp.json();

    renderZones(sortResult.zones);
    renderStrats(sortResult.all_results, sortResult.best_index);

    document.getElementById('zonesContainer').style.display = 'block';
    document.getElementById('stratsContainer').style.display = 'block';
    document.getElementById('infoStrats').textContent = sortResult.all_results.length;
    const best = sortResult.all_results[0];
    document.getElementById('infoBestSingles').textContent = best.stats.single;
    showToast(`理牌完成！最优方案: ${best.stats.single}张单牌`);
  } catch(e) {
    showToast('理牌失败: ' + e.message);
  } finally {
    document.getElementById('btnSort').disabled = false;
    document.getElementById('loading').classList.remove('active');
  }
}

// ── Render zones ──
function renderZones(zones) {
  const container = document.getElementById('zones');
  container.innerHTML = '';

  const zoneNames = {
    bombs: ['💣 炸弹区 (sortBombs)', 'bombs'],
    notsort: ['🃏 非理牌区 (notsort)', 'notsort'],
    sortR: ['📏 理牌右区 (sortR)', 'sortR'],
  };

  for (const [key, [label, cls]] of Object.entries(zoneNames)) {
    const groups = zones[key];
    const total = groups.reduce((s,g) => s + g.size, 0);
    const div = document.createElement('div');
    div.className = 'zone';
    div.innerHTML = `<div class="zone-label">${label} <span class="count">${total}张</span></div>`;
    const row = document.createElement('div');
    row.className = 'card-row';
    row.style.flexWrap = 'wrap';

    groups.forEach(g => {
      const gdiv = document.createElement('div');
      gdiv.className = 'card-group';
      gdiv.innerHTML = `<span class="group-tag type-${g.group_type}">${groupTypeBadge(g)}</span>`;
      g.cards.forEach(c => {
        const mc = document.createElement('span');
        mc.className = `mini-card ${cardClass(c)}`;
        mc.textContent = cardSuit(c) + cardLabel(c);
        if (c.is_wild) mc.textContent = '癞';
        gdiv.appendChild(mc);
      });
      row.appendChild(gdiv);
    });

    div.appendChild(row);
    container.appendChild(div);
  }

  document.getElementById('zonesContainer').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── Render strategy table ──
function renderStrats(results, bestIdx) {
  const tbody = document.getElementById('stratBody');
  tbody.innerHTML = '';

  results.slice(0, 30).forEach((r, i) => {
    const s = r.stats;
    const isBest = (i === bestIdx);
    const tr = document.createElement('tr');
    if (isBest) tr.className = 'best-row';

    const strategyLabel = {
      O_flush_first:'O·同花先', N_bomb_first:'N·炸弹先', O_flush_no_straight:'O·去顺子'
    }[r.meta.strategy] || r.meta.strategy;

    const statCell = (v, threshold) => {
      let cls = 'stat-mid';
      if (v <= threshold[0]) cls = 'stat-high';
      else if (v >= threshold[1]) cls = 'stat-low';
      return `<span class="stat-badge ${cls}">${v}</span>`;
    };

    tr.innerHTML = `
      <td>${isBest ? '⭐' : i+1}</td>
      <td style="text-align:left">${strategyLabel}</td>
      <td>${r.meta.bomb_wilds}</td>
      <td style="text-align:left;font-size:0.7rem">${r.meta.order.slice(0,4).map(x=>groupTypeName(x).slice(0,2)).join('→')}</td>
      <td>${statCell(s.single, [2, 6])}</td>
      <td>${s.bomb}</td><td>${s.flush}</td><td>${s.bomb}</td>
      <td>${s.straight}</td><td>${s.board}</td><td>${s.steel}</td>
      <td>${s.three_two}</td><td>${s.triple}</td><td>${s.pair}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ── Clear ──
function doClear() {
  currentHand = null;
  sortResult = null;
  document.getElementById('handDisplay').innerHTML = '<span style="color:var(--text-dim);font-size:0.9rem">点击「发牌」开始</span>';
  document.getElementById('zonesContainer').style.display = 'none';
  document.getElementById('stratsContainer').style.display = 'none';
  document.getElementById('infoBar').style.display = 'none';
  document.getElementById('btnSort').disabled = true;
  document.getElementById('zones').innerHTML = '';
  document.getElementById('stratBody').innerHTML = '';
  showToast('桌面已清空');
}
</script>
